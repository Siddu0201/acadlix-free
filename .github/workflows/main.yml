name: Deploy WordPress Plugin

on:
  push:
    branches:
      - yuvayana

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: ./

      - name: Build React app
        run: npm run build:free
        working-directory: ./

      - name: Set plugin version for Free
        run: |
          sed -i 's/{{VERSION}}/1.0.0/' acadlix.php
          sed -i 's/{{VERSION}}/1.0.0/' languages/Common/acadlix.pot

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install Composer
        run: |
          composer install --no-dev --optimize-autoloader --classmap-authoritative
          composer dumpautoload -o --no-dev --classmap-authoritative
        working-directory: ./
      
      - name: Remove PHPUnit, tests & dev artifacts from vendor
        run: |
          rm -rf vendor/**/PHPUnit
          rm -rf vendor/**/phpunit
          rm -rf vendor/**/tests
          rm -rf vendor/**/Tests
          rm -rf vendor/**/.github
          rm -rf vendor/**/docs
          rm -rf vendor/**/doc
          find vendor -type f -name "*.md" -delete

      - name: Remove Carbon locales
        run: |
          find vendor/nesbot/carbon/src/Carbon/Lang -type f ! -name "en.php" -delete
        working-directory: ./

      - name: Zip the plugin
        run: |
          zip -r plugin.zip . \
            -x "node_modules/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "test.json" \
            -x "api.txt" \
            -x "src/*" \
            -x "tests/*" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "composer.lock" \
            -x "webpack.config.js" \
            -x "README.md" \
            -x "*.po" \
            -x "languages/Pro/*" \
            -x "handle-dev-server.sh" \
            -x "jsconfig.json" \
            -x "vendor/**/PHPUnit/*" \
            -x "vendor/**/phpunit/*" \
            -x "vendor/**/tests/*"
        working-directory: ./

      # - name: Upload ZIP to server
      #   env:
      #     EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      #     EC2_HOST: ${{ secrets.EC2_HOST }}
      #   run: |
      #     echo "$EC2_SSH_KEY" > private_key
      #     chmod 600 private_key
      #     scp -o StrictHostKeyChecking=no -i private_key plugin.zip bitnami@$EC2_HOST:/home/bitnami/

      # - name: Deploy to WordPress
      #   env:
      #     EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      #     EC2_HOST: ${{ secrets.EC2_HOST }}
      #   run: |
      #     echo "$EC2_SSH_KEY" > private_key
      #     chmod 600 private_key
      #     ssh -o StrictHostKeyChecking=no -i private_key bitnami@$EC2_HOST << 'EOF'
      #       unzip -o /home/bitnami/plugin.zip -d /home/bitnami/stack/wordpress/wp-content/plugins/acadlix
      #       rm /home/bitnami/plugin.zip
      #     EOF

      - name: Upload ZIP to Hostinger
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          echo "$HOSTINGER_SSH_KEY" > private_key
          chmod 600 private_key
          echo "Uploading as $HOSTINGER_USER@$HOSTINGER_HOST on port $HOSTINGER_PORT"
          scp -o StrictHostKeyChecking=no -i private_key -P $HOSTINGER_PORT plugin.zip $HOSTINGER_USER@$HOSTINGER_HOST:/home/$HOSTINGER_USER/

      - name: Deploy to WordPress (Hostinger)
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          echo "$HOSTINGER_SSH_KEY" > private_key
          chmod 600 private_key
          USER_HOME="/home/$HOSTINGER_USER"
          PLUGIN_DIR_DEV="$USER_HOME/domains/acadlix.in/public_html/dev/wp-content/plugins/acadlix"
          PLUGIN_DIR_FREE="$USER_HOME/domains/acadlix.in/public_html/free/wp-content/plugins/acadlix"
          ZIP_PATH="$USER_HOME/plugin.zip"

          ssh -o StrictHostKeyChecking=no -i private_key -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" << EOF

            echo "Deploying to Hostinger..."

            # Deploy to dev subdomain
            echo "Deploying to dev subdomain..."
            rm -rf "$PLUGIN_DIR_DEV"
            unzip -o "$ZIP_PATH" -d "$PLUGIN_DIR_DEV"
            find "$PLUGIN_DIR_DEV" -type d -exec chmod 755 {} \;
            find "$PLUGIN_DIR_DEV" -type f -exec chmod 644 {} \;

            # Deploy to free subdomain
            echo "Deploying to free subdomain..."
            rm -rf "$PLUGIN_DIR_FREE"
            unzip -o "$ZIP_PATH" -d "$PLUGIN_DIR_FREE"
            find "$PLUGIN_DIR_FREE" -type d -exec chmod 755 {} \;
            find "$PLUGIN_DIR_FREE" -type f -exec chmod 644 {} \;

            # Cleanup
            rm "$ZIP_PATH"
          EOF
