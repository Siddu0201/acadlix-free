name: Deploy WordPress Plugin

on:
  push:
    branches:
      - yuvayana

env:
  PLUGIN_VERSION: "1.0.6"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Build React app (Free)
        run: npm run build:free

      - name: Set plugin version for Free
        run: |
          sed -i "s/{{VERSION}}/${{ env.PLUGIN_VERSION }}/" acadlix.php
          sed -i "s/{{VERSION}}/${{ env.PLUGIN_VERSION }}/" languages/Common/acadlix.pot
          sed -i "s/{{VERSION}}/${{ env.PLUGIN_VERSION }}/" readme.txt

      # ----------------------------------
      # PHP / Composer
      # ----------------------------------
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install Composer dependencies (production only)
        run: |
          composer install --no-dev --optimize-autoloader --classmap-authoritative
          composer dumpautoload -o --no-dev --classmap-authoritative
      
      # ----------------------------------
      # Install WP-CLI (REQUIRED)
      # ----------------------------------
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          php wp-cli.phar --info
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
      
      # ----------------------------------
      # Install dist-archive command
      # ----------------------------------
      - name: Install wp dist-archive command
        run: |
          wp package install wp-cli/dist-archive-command:3.1.0 --allow-root

      # ----------------------------------
      # Build WordPress.org compliant ZIP
      # ----------------------------------
      - name: Build plugin ZIP using wp dist-archive
        run: |
            wp dist-archive . --allow-root
            echo "Files created:"
            ls -lh
            ls -lh ..
            mv ../acadlix*.zip plugin.zip

      # ----------------------------------
      # Upload ZIP to Hostinger
      # ----------------------------------
      - name: Upload ZIP to Hostinger
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          echo "$HOSTINGER_SSH_KEY" > private_key
          chmod 600 private_key
          echo "Uploading as $HOSTINGER_USER@$HOSTINGER_HOST on port $HOSTINGER_PORT"
          scp -o StrictHostKeyChecking=no -i private_key -P $HOSTINGER_PORT plugin.zip \
            $HOSTINGER_USER@$HOSTINGER_HOST:/home/$HOSTINGER_USER/

      # ----------------------------------
      # Deploy to WordPress (Hostinger)
      # ----------------------------------
      - name: Deploy to WordPress (Hostinger)
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          echo "$HOSTINGER_SSH_KEY" > private_key
          chmod 600 private_key
          
          USER_HOME="/home/$HOSTINGER_USER"
          PLUGIN_DIR_DEV="$USER_HOME/domains/acadlix.in/public_html/dev/wp-content/plugins"
          ACADLIX_DIR_DEV="$PLUGIN_DIR_DEV/acadlix"
          PLUGIN_DIR_FREE="$USER_HOME/domains/acadlix.in/public_html/free/wp-content/plugins"
          ACADLIX_DIR_FREE="$PLUGIN_DIR_FREE/acadlix"
          ZIP_PATH="$USER_HOME/plugin.zip"

          ssh -o StrictHostKeyChecking=no -i private_key -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" << EOF

            echo "Deploying to Hostinger..."

            # Deploy to dev subdomain
            echo "Deploying to dev subdomain..."
            rm -rf "$ACADLIX_DIR_DEV"
            unzip -o "$ZIP_PATH" -d "$PLUGIN_DIR_DEV"
            find "$ACADLIX_DIR_DEV" -type d -exec chmod 755 {} \;
            find "$ACADLIX_DIR_DEV" -type f -exec chmod 644 {} \;

            # Deploy to free subdomain
            echo "Deploying to free subdomain..."
            rm -rf "$ACADLIX_DIR_FREE"
            unzip -o "$ZIP_PATH" -d "$PLUGIN_DIR_FREE"
            find "$ACADLIX_DIR_FREE" -type d -exec chmod 755 {} \;
            find "$ACADLIX_DIR_FREE" -type f -exec chmod 644 {} \;

            # Cleanup
            rm "$ZIP_PATH"
          EOF
