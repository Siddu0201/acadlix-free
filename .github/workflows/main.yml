name: Deploy WordPress Plugin

on:
  push:
    branches:
      - yuvayana

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: ./

      - name: Build React app
        run: npm run build:free
        working-directory: ./

      - name: Set plugin version for Free
        run: |
          sed -i 's/{{VERSION}}/1.0.0/' acadlix.php
          sed -i 's/{{VERSION}}/1.0.0/' languages/Common/acadlix.pot
          sed -i 's/{{PLUGIN_TYPE}}/free/' acadlix.php
          sed -i 's|{{SIBLING_PLUGIN_BASENAME}}|acadlix-pro/acadlix.php|' acadlix.php

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install Composer
        run: |
          composer install --no-dev --optimize-autoloader --classmap-authoritative
          composer dumpautoload -o --no-dev --classmap-authoritative
        working-directory: ./
      
      - name: Clean vendor folder (safe)
        run: |
          find vendor -type d -name "tests" -exec rm -rf {} +
          find vendor -type d -name "Tests" -exec rm -rf {} +
          find vendor -type d -name "doc" -exec rm -rf {} +
          find vendor -type d -name "docs" -exec rm -rf {} +
          find vendor -type d -name ".github" -exec rm -rf {} +
          find vendor -type f -name "*.md" -delete
        working-directory: ./

      - name: Remove Carbon locales
        run: |
          find vendor/nesbot/carbon/src/Carbon/Lang -type f ! -name "en.php" -delete
        working-directory: ./

      - name: Zip the plugin
        run: |
          zip -r plugin.zip . -x "node_modules/*" \
                              -x ".gitignore" \
                              -x ".git/*" \
                              -x ".github/*" \
                              -x "src/*" \
                              -x "package-lock.json" \
                              -x "package.json" \
                              -x "README.md" \
                              -x "composer.json" \
                              -x "composer.lock" \
                              -x "webpack.config.js" \
                              -x "test.json" \
                              -x "api.txt" \
                              -x "*.po" \
                              -x "languages/Pro/*" \
                              -x handle-dev-server.sh \
                              -x jsconfig.json \
        working-directory: ./

      # - name: Upload ZIP to server
      #   env:
      #     EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      #     EC2_HOST: ${{ secrets.EC2_HOST }}
      #   run: |
      #     echo "$EC2_SSH_KEY" > private_key
      #     chmod 600 private_key
      #     scp -o StrictHostKeyChecking=no -i private_key plugin.zip bitnami@$EC2_HOST:/home/bitnami/

      # - name: Deploy to WordPress
      #   env:
      #     EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      #     EC2_HOST: ${{ secrets.EC2_HOST }}
      #   run: |
      #     echo "$EC2_SSH_KEY" > private_key
      #     chmod 600 private_key
      #     ssh -o StrictHostKeyChecking=no -i private_key bitnami@$EC2_HOST << 'EOF'
      #       unzip -o /home/bitnami/plugin.zip -d /home/bitnami/stack/wordpress/wp-content/plugins/acadlix
      #       rm /home/bitnami/plugin.zip
      #     EOF

      - name: Upload ZIP to Hostinger
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          echo "$HOSTINGER_SSH_KEY" > private_key
          chmod 600 private_key
          echo "Uploading as $HOSTINGER_USER@$HOSTINGER_HOST on port $HOSTINGER_PORT"
          scp -o StrictHostKeyChecking=no -i private_key -P $HOSTINGER_PORT plugin.zip $HOSTINGER_USER@$HOSTINGER_HOST:/home/$HOSTINGER_USER/

      - name: Deploy to WordPress (Hostinger)
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
        run: |
          echo "$HOSTINGER_SSH_KEY" > private_key
          chmod 600 private_key
          USER_HOME="/home/$HOSTINGER_USER"
          PLUGIN_DIR="$USER_HOME/domains/acadlix.in/public_html/dev/wp-content/plugins/acadlix"
          ZIP_PATH="$USER_HOME/plugin.zip"
          PLUGIN_PARENT="$USER_HOME/domains/acadlix.in/public_html/dev/wp-content/plugins/"

          ssh -o StrictHostKeyChecking=no -i private_key -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" << EOF

            echo "Deploying to Hostinger..."

            # Remove old plugin
            rm -rf "$PLUGIN_DIR"

            # Unzip new plugin
            unzip -o "$ZIP_PATH" -d "$PLUGIN_DIR"

            # Fix permissions
            find "$PLUGIN_DIR" -type d -exec chmod 755 {} \;
            find "$PLUGIN_DIR" -type f -exec chmod 644 {} \;

            # Cleanup
            rm "$ZIP_PATH"
          EOF
